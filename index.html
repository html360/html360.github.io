		<style>
			@font-face {
				font-family: 'inconsolata';
				src: url('inconsolata.woff') format('woff');
				font-weight: normal;
				font-style: normal;
			}

			* {
				box-sizing: border-box;
			}

			html {
				height: 100%;
			}

			body {
				background-color: #ffffff;
				margin: 0px;
				height: 100%;
				color: #555;
				font-family: 'inconsolata';
				font-size: 15px;
				line-height: 18px;
				overflow: hidden;
			}

			h1 {
				margin-top: 30px;
				margin-bottom: 40px;
				margin-left: 20px;
				font-size: 25px;
				font-weight: normal;
			}

			h2 {
				font-size: 20px;
				font-weight: normal;
			}

			a {
				color: #2194CE;
				text-decoration: none;
			}

			#panel {
				position: fixed;
				left: 0px;
				width: 310px;
				height: 100%;
				overflow: auto;
				background: #fafafa;
			}

			#panel #content {
				padding: 0px 20px 20px 20px;
			}

			#panel #content .link {
				color: #2194CE;
				text-decoration: none;
				cursor: pointer;
				display: block;
			}

			#panel #content .link.active  {
				text-decoration: underline;
			}

			#viewer {
				position: absolute;
				border: 0px;
				left: 310px;
				width: calc(100% - 310px);
				height: 100%;
				overflow: auto;
			}

			#panel li b {
				font-weight: bold;
			}
		</style>

		<script type="text/javascript">
			window.onclick = e => {
				if (e.target.classList.contains("link")) {
					const content = document.querySelector('#content');
					const links = content.querySelectorAll(".link");
					links.forEach(x => x.classList.remove("active"));
					e.target.classList.add("active");

					document.getElementById("viewer").focus();
				}

			}
		</script>
	</head>

			<div id="content">

			</div>
		</div>
		<iframe id="viewer" src="LiveDemo/1.html" name="viewer" allowfullscreen="" onmousewheel=""></iframe>
	</body>
